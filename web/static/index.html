<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA Agent Web</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header id="toolbar">
  <div class="toolbar-group">
    <label>数据源</label>
    <select id="ds-kind"></select>
    <label>品种</label>
    <input id="ds-symbol" type="text" value="XAUUSD" size="10">
    <label>周期</label>
    <select id="ds-timeframe"></select>
    <label>K线数</label>
    <input id="ds-bar-count" type="number" value="100" min="2" max="5000" size="5">
    <button id="btn-analyze" class="primary">分析</button>
    <button id="btn-cancel" class="danger" disabled>取消</button>
    <button id="btn-refresh">刷新K线</button>
  </div>
  <div class="toolbar-right">
    <button id="btn-settings">⚙ 设置</button>
  </div>
</header>

<div id="main">
  <div id="chart-container"></div>
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" data-tab="stream">实时分析</button>
      <button class="tab" data-tab="decision">决策</button>
      <button class="tab" data-tab="chat">追问</button>
    </div>

    <div id="tab-stream" class="tab-panel active">
      <div id="stage-badge"></div>
      <div id="stream-reasoning"></div>
      <div id="stream-content"></div>
      <div id="stream-usage"></div>
      <div id="prompt-display"></div>
    </div>

    <div id="tab-decision" class="tab-panel">
      <div id="decision-content">尚未进行交易分析</div>
    </div>

    <div id="tab-chat" class="tab-panel">
      <div id="chat-history"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="输入追问…" disabled>
        <button id="btn-chat-send" disabled>发送</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <h2>设置</h2>
    <div class="settings-tabs">
      <button class="stab active" data-stab="s-provider">AI 服务</button>
      <button class="stab" data-stab="s-general">通用</button>
    </div>
    <form id="settings-form">
      <div id="stab-s-provider" class="stab-panel active">
        <label>Base URL <input id="s-base-url" type="text"></label>
        <label>Model <input id="s-model" type="text"></label>
        <label>API Key <input id="s-api-key" type="password"></label>
        <label>Reasoning Effort
          <select id="s-reasoning-effort">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high" selected>high</option>
            <option value="max">max</option>
          </select>
        </label>
        <label>Thinking <input id="s-thinking" type="checkbox" checked></label>
      </div>
      <div id="stab-s-general" class="stab-panel">
        <label>刷新间隔(ms) <input id="s-refresh-ms" type="number" value="1000"></label>
        <label>决策倾向
          <select id="s-decision-stance">
            <option value="conservative">保守</option>
            <option value="balanced" selected>平衡</option>
            <option value="aggressive">激进</option>
            <option value="extreme_aggressive">极度激进</option>
          </select>
        </label>
        <label>上下文警告阈值(%) <input id="s-ctx-warn" type="number" value="80"></label>
      </div>
      <div class="form-actions">
        <button type="submit" class="primary">保存</button>
        <button type="button" id="btn-modal-close">取消</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/chart.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
