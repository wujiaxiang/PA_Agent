name: Sync upstream

# 每周一 09:00 UTC (北京时间 17:00) 自动检查上游是否有新提交,
# 有则开 PR 到本仓库 main 分支供人工 review。
# 也支持 workflow_dispatch 手动触发。
#
# TODO P2.5 — 降低手动 merge upstream 的维护成本。
# 上游仓库需配置为 secret `UPSTREAM_REPO` (格式: owner/repo, 如 rosemarycox5334-debug/PA_Agent)
# 若上游为公开仓库,可直接在下方 env 块硬编码。

on:
  schedule:
    - cron: "0 9 * * 1"  # 每周一 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 公开上游仓库,直接硬编码;如需切换可改用 secret
      UPSTREAM_REPO: rosemarycox5334-debug/PA_Agent
      UPSTREAM_BRANCH: main
      DOWNSTREAM_BRANCH: main
    steps:
      - name: Checkout downstream
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}" --tags

      - name: Detect new upstream commits
        id: detect
        run: |
          # Find merge-base and count commits ahead
          BASE=$(git merge-base HEAD upstream/"${UPSTREAM_BRANCH}")
          COMMITS=$(git rev-list --count "${BASE}..upstream/${UPSTREAM_BRANCH}")
          echo "commits=${COMMITS}" >> "$GITHUB_OUTPUT"
          echo "Upstream has ${COMMITS} new commit(s) since merge-base ${BASE}"
          if [ "${COMMITS}" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List changed files (for PR body)
        if: steps.detect.outputs.skip == 'false'
        id: files
        run: |
          # Get list of files changed in upstream commits
          FILES=$(git diff --name-only HEAD upstream/"${UPSTREAM_BRANCH}" | head -50)
          {
            echo "files<<EOF"
            echo "${FILES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create sync branch and merge
        if: steps.detect.outputs.skip == 'false'
        run: |
          BRANCH="chore/sync-upstream-$(date +%Y%m%d)"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          git checkout -b "${BRANCH}"
          # Attempt merge; keep going on conflicts — we surface them in the PR
          git merge upstream/"${UPSTREAM_BRANCH}" --no-edit --no-ff || {
            echo "::warning::Merge conflicts detected — pushing partial state for PR review"
            # List conflicted files for the PR body
            git diff --name-only --diff-filter=U > /tmp/conflicts.txt || true
          }

      - name: Push sync branch
        if: steps.detect.outputs.skip == 'false'
        run: |
          git push --set-upstream origin "${BRANCH}"

      - name: Build PR body
        if: steps.detect.outputs.skip == 'false'
        id: body
        run: |
          {
            echo "body<<EOF"
            echo "# Upstream sync $(date +%Y-%m-%d)"
            echo ""
            echo "Upstream repository: \`${UPSTREAM_REPO}\`"
            echo "Commits being merged: ${{ steps.detect.outputs.commits }}"
            echo ""
            echo "## Changed files (top 50)"
            echo '```'"
            echo "${{ steps.files.outputs.files }}"
            echo '```'"
            echo ""
            if [ -f /tmp/conflicts.txt ] && [ -s /tmp/conflicts.txt ]; then
              echo "## ⚠️ Merge conflicts — manual resolution required"
              echo ""
              echo "Conflicted files:"
              echo '```'"
              cat /tmp/conflicts.txt
              echo '```'"
              echo ""
              echo "**Suggested handling**:"
              echo "- For \`pa_agent/gui/\` conflicts: keep our deletion (Web-only mode)"
              echo "- For \`pa_agent/ai/deepseek_client.py\`: keep our stream_chat + max_output_tokens"
              echo "- For \`pa_agent/data/tradingview.py\`: keep our _patch_tvdatafeed_ws_headers"
              echo "- For \`pa_agent/config/settings.py\`: keep our max_output_tokens field"
              echo "- For \`web/\`: keep our changes entirely (upstream has no web/)"
            else
              echo "✅ No conflicts — clean merge"
            fi
            echo ""
            echo "---"
            echo "_Auto-generated by \`.github/workflows/sync-upstream.yml\`_"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.detect.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync upstream ${{ env.BRANCH }}" \
            --body "${{ steps.body.outputs.body }}" \
            --base "${DOWNSTREAM_BRANCH}" \
            --head "${{ env.BRANCH }}" \
            --label "upstream-sync"

      - name: No upstream changes
        if: steps.detect.outputs.skip == 'true'
        run: echo "Upstream is up to date — no PR created."
